<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rivelle Studio - Art Gallery</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* General Page Styles */
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #e6dfd5, #c1b7aa, #3E2723, #ffffff);
      background-repeat: no-repeat;
      background-size: cover;
      position: relative;
    }

    /* Wave pattern overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('your-uploaded-wave-image.jpg') repeat; /* Replace with your wave pattern */
      opacity: 0.05;
      z-index: -1;
    }

    /* Navigation */
    nav {
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: flex-end;
      background: rgba(255, 255, 255, 0.85);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      text-decoration: none;
      font-weight: 500;
      color: #3E2723;
      transition: color 0.3s;
    }

    nav ul li a:hover {
      color: #8B5E3C; /* brown highlight on hover */
    }

    /* Gallery Section */
    #gallery {
      padding: 100px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #gallery h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      color: #3E2723;
      text-align: center;
      margin-bottom: 60px;
    }

    .gallery-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      max-width: 1200px;
      width: 100%;
    }

    .gallery-item {
      flex: 1 1 calc(20% - 25px);
      max-width: 250px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background: #fefcf8;
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
    }

    .gallery-item:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 28px rgba(0,0,0,0.25);
    }

    /* Responsive */
    @media(max-width: 1024px) {
      .gallery-item {
        flex: 1 1 calc(33% - 20px);
      }
    }

    @media(max-width: 768px) {
      .gallery-item {
        flex: 1 1 calc(45% - 20px);
      }
    }

    @media(max-width: 480px) {
      .gallery-item {
        flex: 1 1 100%;
      }
    }
  </style>
</head>

<body>
  <!-- Navigation -->
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="#gallery">Gallery</a></li>
    </ul>
  </nav>

  <!-- Gallery Section -->
  <section id="gallery">
    <h2>Art Gallery</h2>
    <div class="gallery-container">
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1529101091764-c3526daf38fe" alt="Art 1">
      </div>
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde" alt="Art 2">
      </div>
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1528747045269-390fe33c19e2" alt="Art 3">
      </div>
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1542744173-05336fcc7ad4" alt="Art 4">
      </div>
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1523206489230-c012f67c0e6d" alt="Art 5">
      </div>
    </div>
  </section>
</body>
</html>
