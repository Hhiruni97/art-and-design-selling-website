<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivelle Studio | Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* --- Global Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDFBF7;
            color: #000;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- Header --- */
        header {
            text-align: center;
            padding: 60px 20px 40px 20px;
            background: linear-gradient(135deg, #CBAF91, #FDFBF7);
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: #5C3A21;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2rem;
            color: #3E2C1C;
        }

        /* --- Gallery Grid --- */
        .gallery-container {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .art-card {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            background-color: #fff;
        }

        .art-card img {
            width: 100%;
            display: block;
            border-radius: 15px;
            transition: transform 0.3s ease;
        }

        .art-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .art-card:hover img {
            transform: scale(1.1);
        }

        .art-caption {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 15px;
            text-align: center;
            font-weight: 500;
            color: #5C3A21;
            font-family: 'Cormorant Garamond', serif;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 40px 20px;
            background-color: #CBAF91;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        footer a {
            color: #fff;
            margin: 0 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Rivelle Studio</h1>
        <p>Soft, peaceful, and elegant art for your space</p>
    </header>

    <!-- Gallery Section -->
    <section class="gallery-container">
        <div class="art-card">
            <img src="https://via.placeholder.com/400x400.png?text=Art+1" alt="Art 1">
            <div class="art-caption">Art 1</div>
        </div>
        <div class="art-card">
            <img src="https://via.placeholder.com/400x400.png?text=Art+2" alt="Art 2">
            <div class="art-caption">Art 2</div>
        </div>
        <div class="art-card">
            <img src="https://via.placeholder.com/400x400.png?text=Art+3" alt="Art 3">
            <div class="art-caption">Art 3</div>
        </div>
        <div class="art-card">
            <img src="https://via.placeholder.com/400x400.png?text=Art+4" alt="Art 4">
            <div class="art-caption">Art 4</div>
        </div>
        <div class="art-card">
            <img src="https://via.placeholder.com/400x400.png?text=Art+5" alt="Art 5">
            <div class="art-caption">Art 5</div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        &copy; 2026 Rivelle Studio | 
        <a href="index.html">Home</a> | 
        <a href="about.html">About</a> | 
        <a href="shop.html">Shop</a> | 
        <a href="contact.html">Contact</a>
    </footer>

</body>
</html>
