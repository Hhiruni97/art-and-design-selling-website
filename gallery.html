<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Rivelle Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        font-family: 'Inter', sans-serif; 
        background: url('/images/wavy-bg.jpg') center/cover no-repeat; /* replace with your wavy image */ 
        color: #2C2A28; 
        line-height: 1.7;
    }

    nav {
        background-color: #DAD7D2;
        display: flex;
        justify-content: center;
        padding: 20px 0;
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid #CFCAC4;
    }
    nav a {
        margin: 0 15px;
        font-weight: 500;
        font-size: 1rem;
        padding: 8px 16px;
        border-radius: 8px;
        color: #2C2A28;
        transition: background 0.3s;
    }
    nav a:hover { background-color: #CFCAC4; }

    header {
        text-align: center;
        padding: 80px 20px 20px;
    }
    header h1 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 3rem;
        color: #3B2F2F;
        margin-bottom: 10px;
    }
    header p { font-size: 1.2rem; color: #5B5955; }

    main {
        max-width: 1200px;
        margin: 30px auto;
        padding: 0 20px 50px;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 30px;
    }
    .grid-item {
        background-color: #FFFFFF;
        border-radius: 20px;
        overflow: hidden;
        transition: transform 0.3s, box-shadow 0.3s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
    .grid-item:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .grid-item img {
        width: 100%;
        display: block;
        border-radius: 20px;
    }

    .btn {
        display: inline-block;
        margin-top: 30px;
        padding: 14px 28px;
        background-color: #5A463F;
        color: #FFFFFF;
        border-radius: 15px;
        font-weight: 500;
        transition: background 0.3s;
    }
    .btn:hover { background-color: #3B2F2F; }

    footer {
        text-align: center;
        padding: 35px 20px;
        background-color: #DAD7D2;
        color: #2C2A28;
        font-size: 0.9rem;
        margin-top: 50px;
        border-top: 1px solid #CFCAC4;
    }
</style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="shop.html">Shop</a>
        <a href="contact.html">Contact</a>
    </nav>

    <header>
        <h1>Gallery</h1>
        <p>Explore beautiful artworks handpicked from elegant collections</p>
    </header>

    <main>
        <div class="grid">
            <div class="grid-item"><img src="IMAGE1_URL_HERE" alt="Art 1"></div>
            <div class="grid-item"><img src="IMAGE2_URL_HERE" alt="Art 2"></div>
            <div class="grid-item"><img src="IMAGE3_URL_HERE" alt="Art 3"></div>
            <div class="grid-item"><img src="IMAGE4_URL_HERE" alt="Art 4"></div>
            <div class="grid-item"><img src="IMAGE5_URL_HERE" alt="Art 5"></div>
        </div>

        <a href="index.html" class="btn">Back to Home</a>
    </main>

    <footer>
        &copy; 2026 Rivelle Studio. All rights reserved.
    </footer>
</body>
</html>
