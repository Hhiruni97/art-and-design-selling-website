<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Rivelle Studio</title>

  <style>
    body {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      background: url('https://images.pexels.com/photos/7394074/pexels-photo-7394074.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover no-repeat;
      color: #3E2723;
    }

    /* Navigation */
    nav {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.85);
      display: flex;
      justify-content: center;
      padding: 20px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 40px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      text-decoration: none;
      font-weight: 500;
      color: #3E2723;
      font-size: 18px;
      transition: color 0.3s;
    }

    nav ul li a:hover {
      color: #8B5E3C; /* brown highlight on hover */
    }

    /* Gallery Section */
    #gallery {
      text-align: center;
      padding: 100px 20px;
      backdrop-filter: blur(4px); /* soft blur over background */
    }

    #gallery h1 {
      font-size: 48px;
      margin-bottom: 50px;
      color: #4B372E;
    }

    .gallery-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      max-width: 1200px;
      margin: auto;
    }

    .gallery-item {
      max-width: 250px;
      text-align: center;
    }

    .gallery-item img {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
    }

    .gallery-item img:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }

    .gallery-item p {
      margin-top: 12px;
      font-size: 18px;
      color: #4B372E;
    }

    /* Responsive */
    @media(max-width:768px) {
      .gallery-item {
        max-width: 45%;
      }
    }

    @media(max-width:480px) {
      .gallery-item {
        max-width: 90%;
      }
      nav ul {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <nav>
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="gallery.html">Gallery</a></li>
    </ul>
  </nav>

  <!-- Gallery Section -->
  <section id="gallery">
    <h1>Gallery</h1>

    <div class="gallery-container">
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1529101091764-c3526daf38fe" alt="Art 1">
        <p>Calm Horizons</p>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde" alt="Art 2">
        <p>Soft Blend</p>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1528747045269-390fe33c19e2" alt="Art 3">
        <p>Quiet Lines</p>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1542744173-05336fcc7ad4" alt="Art 4">
        <p>Peaceful Waves</p>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1523206489230-c012f67c0e6d" alt="Art 5">
        <p>Warm Moments</p>
      </div>
    </div>
  </section>

</body>
</html>
