<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rivelle Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Inter:wght@300;400;500&display=swap');

body { margin:0; font-family:'Inter',sans-serif; background:#FDF9F2; color:#2E2E2E; scroll-behavior:smooth;}
a{text-decoration:none;color:#2E2E2E;}

#navbar {position:sticky; top:0; width:100%; background:#FFF8F2; box-shadow:0 2px 6px rgba(0,0,0,0.05);}
nav {display:flex; justify-content:space-between; align-items:center; padding:15px 40px;}
.logo { font-family:'Cormorant Garamond', serif; font-size:2.4rem; font-weight:700; color:#1C1C1C; text-shadow:2px 2px 5px rgba(0,0,0,0.2);}
.nav-links{list-style:none; display:flex; gap:30px;}
.nav-links li a:hover { color:#C2A974; }

#hero { display:flex; justify-content:center; align-items:center; height:90vh; text-align:center; background: url('images/img_home.jpg') center/cover no-repeat; color:#FFF;}
#hero h1 { font-family:'Cormorant Garamond', serif; font-size:4rem; margin-bottom:1rem; text-shadow:2px 2px 5px rgba(0,0,0,0.5);}
#hero p { font-size:1.5rem; margin-bottom:2rem; text-shadow:1px 1px 3px rgba(0,0,0,0.5);}
.btn { background:#C2A974; color:#FFF; padding:15px 30px; border-radius:25px; font-weight:500; transition:0.3s;}
.btn:hover { background:#A98C5B; }

#preview-gallery { display:flex; justify-content:center; gap:30px; flex-wrap:wrap; padding:60px 20px;}
.preview-item img { width:100%; max-width:300px; border-radius:15px; box-shadow:0 8px 20px rgba(0,0,0,0.1); transition:transform .3s;}
.preview-item img:hover { transform:scale(1.05); }

@media(max-width:768px){ #hero h1{font-size:3rem;} #hero p{font-size:1.2rem;} }
</style>
</head>
<body>

<header id="navbar">
<nav>
<div class="logo">Rivelle Studio</div>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="gallery.html">Gallery</a></li>
<li><a href="shop.html">Shop</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>
</header>

<section id="hero">
<div>
<h1>Rivelle Studio</h1>
<p>Elegant, peaceful art for your space</p>
<a href="gallery.html" class="btn">Explore Art</a>
</div>
</section>

<section id="preview-gallery">
<div class="preview-item"><img src="images/art1.jpg" alt="Art 1"></div>
<div class="preview-item"><img src="images/art2.jpg" alt="Art 2"></div>
<div class="preview-item"><img src="images/art3.jpg" alt="Art 3"></div>
</section>

</body>
</html>
