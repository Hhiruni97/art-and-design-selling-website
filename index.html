<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivelle Studio</title>
    <!-- Google Fonts for elegance -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* General body styling */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #F4F1ED; /* soft ash background */
            color: #333;
        }

        /* Header section */
        header {
            position: relative;
            text-align: center;
            color: white;
        }

        /* Hero background image */
        .hero {
            background-image: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1470&q=80'); 
            background-size: cover;
            background-position: center;
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4em;
            margin: 0;
            color: #2E1F1F; /* pastel brown-ish */
        }

        .hero p {
            font-size: 1.5em;
            margin-top: 10px;
            color: #555; /* soft black/grey */
        }

        /* Section for images */
        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 50px 20px;
            background-color: #FAF8F5; /* soft white-ish */
        }

        .gallery img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #2E2E2E; /* dark ash/black */
            color: white;
        }

    </style>
</head>
<body>

    <header class="hero">
        <h1>Rivelle Studio</h1>
        <p>Elegant, peaceful art for your space</p>
    </header>

    <!-- Gallery Section -->
    <section class="gallery">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=800&q=80" alt="Art sample 1">
        <img src="https://images.unsplash.com/photo-1533227268428-f9ed0900fb3b?auto=format&fit=crop&w=800&q=80" alt="Art sample 2">
        <img src="https://images.unsplash.com/photo-1496317899792-9d7dbcd928a1?auto=format&fit=crop&w=800&q=80" alt="Art sample 3">
    </section>

    <footer>
        &copy; 2026 Rivelle Studio. All rights reserved.
    </footer>

</body>
</html>
