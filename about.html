<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rivelle Studio - Elegant Art</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #D8C4B6; /* pastel brown */
      color: #1E1E1E; /* black text */
    }

    nav {
      background-color: #FFFFFF; /* white nav */
      padding: 15px 0;
      text-align: center;
      font-weight: bold;
    }
    nav a {
      margin: 0 20px;
      color: #1E1E1E;
      text-decoration: none;
      font-size: 14px;
    }
    nav a:hover {
      color: #555;
    }

    /* Hero */
    .hero {
      height: 80vh;
      background-image: url("https://images.unsplash.com/photo-1509223197845-458d87318791?auto=format&fit=crop&w=1470&q=80");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      background-blend-mode: multiply;
      background-color: rgba(0,0,0,0.4);
    }
    .hero h1 {
      font-size: 60px;
      margin: 0;
    }
    .hero p {
      font-size: 20px;
      margin-top: 10px;
    }

    /* Featured Section */
    .featured {
      padding: 60px 20px;
      text-align: center;
      background-color: #FFFFFF;
    }
    .featured h2 {
      margin-bottom: 30px;
      font-size: 28px;
    }
    .art-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .art-grid img {
      width: 280px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* Footer */
    footer {
      padding: 20px;
      text-align: center;
      background-color: #1E1E1E;
      color: white;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="gallery.html">Gallery</a>
    <a href="shop.html">Shop</a>
    <a href="contact.html">Contact</a>
  </nav>

  <section class="hero">
    <div>
      <h1>Rivelle Studio</h1>
      <p>Elegant, peaceful art for your space</p>
    </div>
  </section>

  <section class="featured">
    <h2>Featured Art Pieces</h2>
    <div class="art-grid">
      <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=800&q=80" alt="Art 1">
      <img src="https://images.unsplash.com/photo-1580136579312-94651dfd596d?auto=format&fit=crop&w=800&q=80" alt="Art 2">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=800&q=80" alt="Art 3">
    </div>
  </section>

  <footer>
    © 2026 Rivelle Studio — Elegant, peaceful art for your space
  </footer>

</body>
</html>
