<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivelle Studio - Shop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .filter {
            text-align: center;
            margin-bottom: 30px;
        }
        .filter select {
            padding: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="shop.html">Shop</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section>
        <h2>Shop</h2>

        <div class="filter">
            <label for="price">Sort by price:</label>
            <select id="price" name="price">
                <option value="low-high">Low to High</option>
                <option value="high-low">High to Low</option>
            </select>
        </div>

        <div class="gallery">
            <!-- Blank placeholders for art -->
            <a href="shop-item.html"><img class="shop-img" src="https://via.placeholder.com/300x200?text=Art+1" alt="Art 1"></a>
            <a href="shop-item.html"><img class="shop-img" src="https://via.placeholder.com/300x200?text=Art+2" alt="Art 2"></a>
            <a href="shop-item.html"><img class="shop-img" src="https://via.placeholder.com/300x200?text=Art+3" alt="Art 3"></a>
        </div>
    </section>

    <footer>
        &copy; 2026 Rivelle Studio. All rights reserved.
    </footer>

</html>
