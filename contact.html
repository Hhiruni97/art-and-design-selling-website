<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivelle Studio | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pApI7H/V6Ab1s5LRfITg9c5Z4j6T1XkV8HzMxJ9i5RgFt0hQXG+gxL5X0KqZrjZy3m4ld9n7Oe0z7vQ7o5qxQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* --- Global Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDFBF7;
            color: #000;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- Header --- */
        header {
            position: relative;
            text-align: center;
            padding: 60px 20px 40px 20px;
            background: linear-gradient(135deg, #CBAF91, #FDFBF7);
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: #5C3A21;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2rem;
            color: #3E2C1C;
        }

        /* --- Navigation Menu (Top Right) --- */
        nav {
            position: absolute;
            top: 20px;
            right: 40px;
        }

        nav a {
            margin-left: 20px;
            padding: 8px 15px;
            background-color: #CBAF91;
            color: #fff;
            font-weight: 500;
            border-radius: 8px;
            transition: background 0.3s, color 0.3s;
        }

        nav a:hover {
            background-color: #5C3A21;
            color: #fff;
        }

        /* --- Contact Section --- */
        .content-wrapper {
            flex: 1;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .contact-message {
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #5C3A21;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .contact-info a {
            color: #3E2C1C;
            transition: color 0.3s;
        }

        .contact-info a:hover {
            color: #CBAF91;
        }

        .social-icons {
            display: flex;
            gap: 25px;
            font-size: 2rem;
        }

        .social-icons a {
            color: #5C3A21;
            transition: color 0.3s, transform 0.3s;
        }

        .social-icons a:hover {
            color: #CBAF91;
            transform: scale(1.2);
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 40px 20px;
            background-color: #CBAF91;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        footer a {
            color: #fff;
            margin: 0 10px;
            font-weight: 500;
        }

        /* --- Make footer stick to bottom --- */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Rivelle Studio</h1>
        <p>Soft, peaceful, and elegant art for your space</p>

        <!-- Top Right Navigation -->
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="shop.html">Shop</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <div class="contact-message">
            You can contact me for custom orders.
        </div>

        <div class="contact-info">
            <div>Email: <a href="mailto:your-email@example.com">your-email@example.com</a></div>
            <div>WhatsApp: <a href="https://wa.me/1234567890" target="_blank">+123 456 7890</a></div>
        </div>

        <div class="social-icons">
            <a href="https://www.instagram.com/yourprofile" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@yourprofile" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        &copy; 2026 Rivelle Studio | 
        <a href="index.html">Home</a> | 
        <a href="about.html">About</a> | 
        <a href="shop.html">Shop</a> | 
        <a href="gallery.html">Gallery</a> | 
        <a href="contact.html">Contact</a>
    </footer>

</body>
</html>
